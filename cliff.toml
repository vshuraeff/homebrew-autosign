# git-cliff config for brew-autosign
# Generates CHANGELOG entries from Conventional Commits since the last tag.

[changelog]
header = "# Changelog\n\nAll notable changes to brew-autosign are documented in this file.\n"
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}{% if commit.breaking %} **[breaking]**{% endif %}
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false  # keep non-conventional commits under "Other"
require_conventional = false
commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     group = "Tests" },
  { message = "^chore",    group = "Chores" },
  { message = "^ci",       group = "CI" },
  { message = "^build",    group = "Build" },
  { message = "^revert",   group = "Reverts" },
  { message = "^sec",      group = "Security" },
  { message = ".*",        group = "Other" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
ignore_tags = ""
topo_order = false
sort_commits = "newest"
